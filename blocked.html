<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>propaganda_nuke · intercepted</title>
    <link rel="stylesheet" href="theme.css">
  </head>
  <body class="pn-blocked-page">

    <div class="pn-blocked-inner">

      <!-- Crosshair / target -->
      <div style="position: relative; width: 160px; height: 160px; margin: 0 auto 28px;">
        <svg class="pn-target" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="80" cy="80" r="74" stroke="currentColor" stroke-width="0.75"/>
          <circle cx="80" cy="80" r="52" stroke="currentColor" stroke-width="0.75"/>
          <circle cx="80" cy="80" r="30" stroke="currentColor" stroke-width="0.75"/>
          <circle cx="80" cy="80" r="4"  fill="currentColor"/>
          <!-- horizontal crosshair -->
          <line x1="0"   y1="80" x2="48" y2="80" stroke="currentColor" stroke-width="0.75"/>
          <line x1="112" y1="80" x2="160" y2="80" stroke="currentColor" stroke-width="0.75"/>
          <!-- vertical crosshair -->
          <line x1="80" y1="0"   x2="80" y2="48"  stroke="currentColor" stroke-width="0.75"/>
          <line x1="80" y1="112" x2="80" y2="160" stroke="currentColor" stroke-width="0.75"/>
          <!-- tick marks -->
          <line x1="80" y1="26" x2="80" y2="32" stroke="currentColor" stroke-width="1"/>
          <line x1="80" y1="128" x2="80" y2="134" stroke="currentColor" stroke-width="1"/>
          <line x1="26" y1="80" x2="32" y2="80" stroke="currentColor" stroke-width="1"/>
          <line x1="128" y1="80" x2="134" y2="80" stroke="currentColor" stroke-width="1"/>
        </svg>
        <!-- Countdown overlaid on target -->
        <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none;">
          <span class="pn-blocked-count" id="countdown">—</span>
        </div>
      </div>

      <p class="pn-blocked-label">Transmission intercepted</p>
      <h1 class="pn-blocked-heading">Stand down.</h1>
      <p class="pn-blocked-body">
        This site has been flagged as a high-manipulation vector.<br>
        Take a breath. You don't have to go there.
      </p>

      <div class="pn-blocked-url" id="blocked-url"></div>

      <div class="pn-blocked-actions">
        <button id="leave-btn" class="pn-button pn-button--solid">Leave</button>
        <button id="open-btn" class="pn-button pn-button--ghost-red" disabled>Override</button>
      </div>

    </div>

    <script src="blocked.js"></script>
  </body>
</html>
